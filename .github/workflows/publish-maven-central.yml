name: Publish Maven Central

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: Release version without the v prefix
        required: true
        type: string

jobs:
  publish:
    runs-on: macos-14
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Cache Kotlin/Native and CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            ~/.konan
            ~/.cocoapods
            ~/Library/Caches/CocoaPods
          key: ${{ runner.os }}-native-publish-${{ hashFiles('**/*.gradle*', '**/gradle.properties', 'gradle/libs.versions.toml', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-native-publish-

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Resolve release version
        id: release-version
        shell: bash
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Normalize signing key
        env:
          MAVEN_CENTRAL_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_CENTRAL_GPG_PRIVATE_KEY }}
          MAVEN_CENTRAL_GPG_PASSPHRASE: ${{ secrets.MAVEN_CENTRAL_GPG_PASSPHRASE }}
        shell: bash
        run: |
          python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          key = os.environ.get("MAVEN_CENTRAL_GPG_PRIVATE_KEY", "").strip()
          passphrase = os.environ.get("MAVEN_CENTRAL_GPG_PASSPHRASE", "")
          github_env = Path(os.environ["GITHUB_ENV"])

          if not key:
              raise SystemExit("MAVEN_CENTRAL_GPG_PRIVATE_KEY is empty")
          if not passphrase:
              raise SystemExit("MAVEN_CENTRAL_GPG_PASSPHRASE is empty")

          normalized = key.replace("\r\n", "\n").replace("\\n", "\n").strip()
          if "BEGIN PGP PRIVATE KEY BLOCK" not in normalized:
              try:
                  normalized = base64.decodebytes(normalized.encode("utf-8")).decode("utf-8")
              except Exception as exc:
                  raise SystemExit(
                      "MAVEN_CENTRAL_GPG_PRIVATE_KEY is neither an ASCII-armored private key nor a valid base64-encoded copy of one"
                  ) from exc

              normalized = normalized.replace("\r\n", "\n").replace("\\n", "\n").strip()
              if "BEGIN PGP PRIVATE KEY BLOCK" not in normalized:
                  raise SystemExit(
                      "Base64-decoded MAVEN_CENTRAL_GPG_PRIVATE_KEY does not contain an ASCII-armored private key block"
                  )

          with github_env.open("a", encoding="utf-8") as fh:
              fh.write("ORG_GRADLE_PROJECT_signingInMemoryKey<<EOF\n")
              fh.write(normalized)
              fh.write("\nEOF\n")
          PY

      - name: Publish to Maven Central
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.MAVEN_CENTRAL_GPG_PASSPHRASE }}
        run: ./gradlew :naver-map-compose:publishToMavenCentral -PVERSION_NAME=${{ steps.release-version.outputs.version }} --no-configuration-cache
